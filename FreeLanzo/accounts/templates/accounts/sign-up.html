{%extends 'main/base.html'%}
{% load static %}

{% block title %}Sign up page{%endblock%}
{% block style %}
<link rel="stylesheet" href="{% static 'accounts/css/sign-style.css' %}">
{% endblock %}


{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card shadow-lg overflow-hidden sign-style">
        
        <div class="row g-0 h-100 ">

            <div class="col-md-6 d-flex align-items-center justify-content-center text-white box">

                <div class="text-center p-4">
                    <h3>Welcome Back!</h3>
                    <p>If you already have an account, sign in here</p>
                    <a href="{%url 'accounts:sign_in_view'%}" class="btn btn-outline-light" >Sign In</a>
                </div>

            </div>

            

            <div class="col-md-6 d-flex align-items-center justify-content-center bg-white">

                <div style="width: 80%;" class="p-4">
                    <form action="" method="post">
                    <h3 class="mb-4 text-center">Create Account</h3>
                    
                    <div class="row mb-3">
                    <div class="col">
                        <input type="text" class="form-control" placeholder="First name" name="first_name" required>
                    </div>
                    <div class="col">
                        <input type="text" class="form-control" placeholder="Last name" name="last_name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Username" name="username" required>
                </div>

                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Email" name="email" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Password" name="password" required>
                </div>
                <div class="mb-3">
                    <div class="form-check mt-3 text-center">
                    <label class="form-check-label link-up" for="agreeTerms">
                        I agree to the <a href="{% url 'accounts:terms_conditions_view'%}">Terms & Conditions</a>
                    </label>
                    <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                    </div>
                    <div class="form-check mt-2">
                    <label class="form-check-label link-up" for="agreePrivacy">
                        I agree to the <a href="{% url 'accounts:privacy_policy_view'%}">Privacy Policy</a>
                    </label>
                    <input class="form-check-input" type="checkbox" id="agreePrivacy" required>
                    </div>
                </div> 

                    <button class="btn btn-custom w-100">Sign Up</button>
                    </form>
                </div>

            </div>
            

        </div>
    </div>

</div>

{% endblock %}
